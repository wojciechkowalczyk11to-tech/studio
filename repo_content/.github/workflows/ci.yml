name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check . --exclude Source --exclude Assistant

  type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Mypy
        run: mypy . --exclude "^(Source|Assistant|scripts|mcp-servers|nexus_agent|nexus_cli)/" --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest -q --no-header

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Bandit scan
        run: bandit -r . -x .venv,venv,node_modules,.git,./Source,./Assistant --skip B101,B404,B603,B607

      - name: TruffleHog OSS scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  extract_source:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, type-check, test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install script dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gitpython requests

      - name: Build source extraction artifact
        run: |
          if [ -f "knowledge-base/scripts/extract_source.py" ]; then
            python knowledge-base/scripts/extract_source.py --repo . --output FULL_SOURCE_CODE.md
          else
            echo "Extract script not found — skipping"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-source-code
          path: FULL_SOURCE_CODE.md
