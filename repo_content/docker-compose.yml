name: nexus-omega-core

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [nexus-net]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [nexus-net]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    networks: [nexus-net]

  telegram-bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://backend:8000/api/v1/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [nexus-net]

  nexus-agent:
    build:
      context: .
      dockerfile: nexus_agent/Dockerfile
    restart: unless-stopped
    env_file: .env
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "python -m nexus_agent --help >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [nexus-net]

  mcp-hub:
    build:
      context: .
      dockerfile: mcp-servers/nexus_mcp_hub/Dockerfile
    restart: unless-stopped
    env_file: .env
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "python -m nexus_mcp_hub.hub --health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [nexus-net]

volumes:
  postgres_data:
  redis_data:

networks:
  nexus-net:
    driver: bridge
