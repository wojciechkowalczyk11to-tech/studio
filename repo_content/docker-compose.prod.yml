services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports: []

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports: []

  backend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports: []

  telegram-bot:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports: []

  nexus-agent:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports: []

  mcp-hub:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports: []
